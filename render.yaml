# Render blueprint for the Pulse API.
# In the Render dashboard: New > Blueprint, connect this repo, and Render reads
# this file. See DEPLOY.md for the full walkthrough.
services:
  - type: web
    name: pulse-api
    runtime: python
    plan: free
    # Install deps, gather static files, run migrations and seed demo data.
    # (SQLite on the free tier is reset on each deploy, so we re-seed here.)
    buildCommand: >-
      pip install -r requirements.txt &&
      python manage.py collectstatic --no-input &&
      python manage.py migrate &&
      python manage.py seed_demo
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: SECRET_KEY
        generateValue: true      # Render generates a strong secret
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      # Set this to your deployed frontend URL once pulse-web is live:
      - key: CORS_ALLOWED_ORIGINS
        sync: false
